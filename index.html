<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DRAGON'S DEBT // Crew-Manifest</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Hintergrund-Ebenen -->
  <div class="bg-glow"></div>
  <div class="scanlines"></div>
  <div class="vignette"></div>
  <div class="frame"></div>
  <div class="stage-flash" id="stageFlash"></div>

  <!-- Topbar -->
  <header class="topbar">
    <div class="brand">
      <span class="logo">⬡</span>
      <div class="brand-text">
        <span class="wy">DRAGON'S DEBT</span>
        <span class="dept">USCSS-FRACHTER // CREW-MANIFEST</span>
      </div>
    </div>
    <div class="status"><span class="dot"></span> SYS-LINK <b>ONLINE</b></div>
  </header>

  <!-- Linkes Panel: Log + Status -->
  <aside class="panel side-left">
    <h2 class="panel-title">Schiffs-Log</h2>
    <div class="log" id="log"></div>
    <h2 class="panel-title">Status</h2>
    <div class="stats" id="stats"></div>
    <div class="controls">
      <button class="ctl" id="saveBtn">Speichern</button>
      <button class="ctl danger" id="resetBtn">Reset</button>
    </div>
    <div class="saved-hint" id="savedHint"></div>
  </aside>

  <!-- ZENTRUM: Deckplan -->
  <main class="shipmap">
    <div class="hud">
      <div class="credits" id="credits">0</div>
      <div class="credits-label">CREDITS</div>
      <div class="rate-chip" id="rate">0 / SEK</div>
      <div class="debt">
        <div class="debt-head">
          <span class="debt-label">SCHULDEN-TILGUNG</span>
          <span class="debt-pct" id="debtStage">0 %</span>
        </div>
        <div class="debt-bar"><span id="debtFill"></span></div>
      </div>
    </div>
    <div class="ship-wrap" id="shipWrap">
      <img class="ship-img" id="shipImg" src="assets/ship.png" alt="" draggable="false"
           onerror="document.getElementById('shipWrap').classList.add('noship'); this.style.display='none';" />
      <div class="deck" id="deck"></div>
    </div>
  </main>

  <!-- Rechtes Panel: Crew + Systeme -->
  <aside class="panel side-right">
    <div class="tabs">
      <button class="tab active" data-tab="crew">Crew</button>
      <button class="tab" data-tab="modules">Systeme</button>
    </div>
    <div class="tab-body" id="crewList"></div>
    <div class="tab-body hidden" id="moduleList"></div>
  </aside>

  <script src="game.js"></script>
  <script src="ship.js"></script>
</body>
</html>
